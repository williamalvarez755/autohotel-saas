<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHotel · Iniciar sesión</title>
  <script src="/js/iconos.js"></script>
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <div class="pantalla-login">
    <div class="caja-login">
      <div class="logo-login">
        <div class="icono"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M2 22h20"/><path d="M10 6h1"/><path d="M13 6h1"/><path d="M10 10h1"/><path d="M13 10h1"/><path d="M10 14h1"/><path d="M13 14h1"/><path d="M10 18h4"/></svg></div>
        <h1>Auto<span>Hotel</span></h1>
        <p>Sistema de gestión de autohoteles</p>
      </div>
      <form id="formulario-login" autocomplete="off">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" required autocapitalize="none" autofocus>
        </div>
        <div class="campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="boton bloque" id="boton-ingresar">Ingresar</button>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/comun.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
