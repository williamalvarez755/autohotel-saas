<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHotel · Superadmin</title>
  <script src="/js/iconos.js"></script>
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">
      <span class="marca-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M2 22h20"/><path d="M10 6h1"/><path d="M13 6h1"/><path d="M10 10h1"/><path d="M13 10h1"/><path d="M10 14h1"/><path d="M13 14h1"/><path d="M10 18h4"/></svg></span>
      <span>Auto<span>Hotel</span></span>
      <span class="texto-marca suave" style="font-weight:400;font-size:13px">· Panel del proveedor</span>
    </div>
    <div class="zona-derecha">
      <button class="boton-campana" id="boton-tema" title="Cambiar tema"></button>
      <div class="usuario-mini">
        <div class="nombre" id="nombre-usuario">—</div>
        <div class="rol">superadmin</div>
      </div>
      <button class="boton secundario chico" id="boton-salir">Salir</button>
    </div>
  </header>

  <main class="contenido" style="max-width:1100px">
    <div class="encabezado-seccion">
      <div>
        <h2>Dueños y suscripciones</h2>
        <div class="sub">Gestione cuentas, hoteles y pagos de mensualidad</div>
      </div>
      <button class="boton" id="boton-nuevo-dueno"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg> Nuevo dueño</button>
    </div>

    <div id="lista-duenos"></div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/comun.js"></script>
  <script src="/js/superadmin.js"></script>
</body>
</html>
