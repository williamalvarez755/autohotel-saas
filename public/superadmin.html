<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoHotel · Superadmin</title>
  <script src="/js/iconos.js"></script>
  <script src="/js/tema.js"></script>
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>
  <header class="barra-superior">
    <div class="marca">
      <span class="marca-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M2 22h20"/><path d="M10 6h1"/><path d="M13 6h1"/><path d="M10 10h1"/><path d="M13 10h1"/><path d="M10 14h1"/><path d="M13 14h1"/><path d="M10 18h4"/></svg></span>
      <span>Auto<span>Hotel</span></span>
      <span class="texto-marca suave" style="font-weight:400;font-size:13px">· Panel del proveedor</span>
    </div>
    <div class="zona-derecha">
      <button class="boton-campana" id="boton-password" title="Cambiar mi contraseña">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7.5" cy="15.5" r="4.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3"/></svg>
      </button>
      <button class="boton-campana" id="boton-tema" title="Cambiar tema"></button>
      <div class="avatar" id="avatar-usuario"></div>
      <div class="usuario-mini">
        <div class="nombre" id="nombre-usuario">—</div>
        <div class="rol">Superadmin</div>
      </div>
      <button class="boton secundario chico" id="boton-salir">Salir</button>
    </div>
  </header>

  <div class="distribucion">
    <nav class="navegacion" id="navegacion"></nav>

    <main class="contenido">
      <section id="seccion-propietarios" class="oculto"></section>
      <section id="seccion-consultas" class="oculto"></section>
      <section id="seccion-limpieza" class="oculto"></section>
      <section id="seccion-retencion" class="oculto"></section>
      <section id="seccion-respaldos" class="oculto"></section>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/comun.js"></script>
  <script src="/js/reportes-tabla.js"></script>
  <script src="/js/superadmin-consultas.js"></script>
  <script src="/js/superadmin-limpieza.js"></script>
  <script src="/js/superadmin-respaldos.js"></script>
  <script src="/js/superadmin.js"></script>
</body>
</html>
